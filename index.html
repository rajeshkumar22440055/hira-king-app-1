<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira King</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            /* Casino Floor Background */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2000') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Card Container */
        .main-card {
            position: relative;
            z-index: 2;
            background: rgba(15, 10, 30, 0.94);
            border: 3px solid #FFD700;
            border-radius: 30px;
            padding: 40px 20px;
            width: 95%;
            max-width: 410px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }

        h1 { 
            color: #FFD700; 
            font-size: 3rem; 
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6), 2px 2px 4px #000; 
            margin-bottom: 5px; 
            font-weight: 900;
        }

        .sub-text { 
            color: #fff; 
            font-size: 1.1rem; 
            margin-bottom: 25px; 
            font-weight: bold; 
            text-shadow: 1px 1px 3px #000;
        }
        
        /* Pot Container Layout */
        .pot-container {
            position: relative;
            width: 100%;
            height: 160px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Real Gold Pot Image Styling */
        .pot-image {
            width: 150px;
            height: auto;
            z-index: 3;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
        }

        /* Falling Gold Coins Animation */
        .falling-coin {
            position: absolute;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #FFF 5%, #FFD700 50%, #B8860B 100%);
            border: 1.5px solid #fff;
            border-radius: 50%;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            z-index: 2;
        }

        .c1 { left: 32%; top: 10px; animation: coinDrop 1.2s linear infinite; }
        .c2 { left: 48%; top: 10px; animation: coinDrop 1.5s linear infinite; animation-delay: 0.3s; }
        .c3 { left: 64%; top: 10px; animation: coinDrop 1.3s linear infinite; animation-delay: 0.7s; }

        @keyframes coinDrop {
            0% { transform: translateY(-30px) rotateY(0deg); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(100px) rotateY(360deg); opacity: 0; }
        }

        /* Premium Buttons */
        .btn-play { 
            display: block; 
            background: linear-gradient(180deg, #FFE4B5 0%, #FFD700 50%, #B8860B 100%); 
            padding: 16px; 
            border-radius: 50px; 
            color: #000; 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 1.2rem; 
            margin-bottom: 15px; 
            border: 2px solid #fff; 
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); 
            transition: all 0.2s ease;
        }
        .btn-play:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6); 
        }

        .btn-wa { 
            display: block; 
            background: linear-gradient(180deg, #2ecc71, #25D366); 
            padding: 14px; 
            border-radius: 50px; 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
            border: 1.5px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.25); 
            transition: all 0.2s ease;
        }
        .btn-wa:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4); 
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>HIRA KING</h1>
    <p class="sub-text">KHELO AUR JEETO DIGITAL COINS!</p>
    
    <div class="pot-container">
        <div class="falling-coin c1"></div>
        <div class="falling-coin c2"></div>
        <div class="falling-coin c3"></div>
        
        <img src="https://i.ibb.co/v4bXw6W/gold-pot-coins.png" alt="Gold Pot" class="pot-image">
    </div>

    <a href="#" class="btn-play">PLAY & WIN BIG COINS</a>
    <a href="https://wa.me/918788849415" class="btn-wa">Chat On WhatsApp</a>
</div>

</body>
</html>
