<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira King</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            /* Casino theme background link updated */
            background: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2000') no-repeat center center fixed; 
            background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        /* Overlay to give a neon casino vibe to any background image */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(238,174,202,0.2) 0%, rgba(148,187,233,0.4) 100%);
            z-index: 1;
        }
        .main-card {
            position: relative;
            z-index: 2;
            background: rgba(15, 10, 30, 0.95);
            border: 3px solid #FFD700;
            border-radius: 30px;
            padding: 40px 20px;
            width: 95%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6), inset 0 0 20px rgba(255, 215, 0, 0.2);
        }
        h1 { color: #FFD700; font-size: 3rem; text-shadow: 0 0 15px rgba(255,215,0,0.6); margin-bottom: 5px; font-weight: 900; }
        .sub-text { color: #fff; font-size: 1.1rem; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px; }
        
        /* Realistic Pot & Coin Container */
        .pot-container {
            position: relative;
            width: 100%;
            height: 180px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        /* Realistic Pot Shape using CSS */
        .real-pot {
            position: relative;
            width: 140px;
            height: 110px;
            background: linear-gradient(135deg, #FFD700, #B8860B, #8B6508);
            border-radius: 50% 50% 40% 40% / 40% 40% 60% 60%;
            border: 3px solid #FFF5EE;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset -10px -10px 20px rgba(0,0,0,0.4), inset 10px 10px 20px rgba(255,255,255,0.4);
        }
        /* Pot Rim/Neck */
        .real-pot::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 10%;
            width: 80%;
            height: 20px;
            background: linear-gradient(90deg, #B8860B, #FFD700, #B8860B);
            border-radius: 50%;
            border: 2px solid #FFF5EE;
        }
        /* Gold Coins Overflowing */
        .overflow-coins {
            position: absolute;
            top: -20px;
            left: 20%;
            width: 60%;
            height: 30px;
            background: radial-gradient(circle, #FFE4B5, #FFD700, #B8860B);
            border-radius: 50%;
            box-shadow: 0 -5px 15px rgba(255,215,0,0.8);
            z-index: 2;
        }

        /* Falling Coins Animation */
        .falling-coin {
            position: absolute;
            width: 18px;
            height: 18px;
            background: linear-gradient(#FFD700, #DAA520);
            border: 1px solid #fff;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1;
        }
        .c1 { left: 35%; animation: coinDrop 1s linear infinite; }
        .c2 { left: 50%; animation: coinDrop 1.4s linear infinite; animation-delay: 0.3s; }
        .c3 { left: 65%; animation: coinDrop 1.2s linear infinite; animation-delay: 0.7s; }

        @keyframes coinDrop {
            0% { transform: translateY(-40px) rotateX(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(70px) rotateX(360deg); opacity: 0; }
        }

        .btn-play { display: block; background: linear-gradient(#FFD700, #B8860B); padding: 18px; border-radius: 50px; color: #000; text-decoration: none; font-weight: 900; font-size: 1.2rem; margin-bottom: 15px; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(255,215,0,0.4); transition: 0.2s; }
        .btn-play:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(255,215,0,0.6); }
        .btn-wa { display: block; background: #25D366; padding: 15px; border-radius: 50px; color: #fff; text-decoration: none; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(37,211,102,0.3); transition: 0.2s; }
        .btn-wa:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(37,211,102,0.5); }
    </style>
</head>
<body>

<div class="main-card">
    <h1>HIRA KING</h1>
    <p class="sub-text">KHELO AUR JEETO DIGITAL COINS!</p>
    
    <div class="pot-container">
        <div class="falling-coin c1"></div>
        <div class="falling-coin c2"></div>
        <div class="falling-coin c3"></div>
        
        <div class="real-pot">
            <div class="overflow-coins"></div>
        </div>
    </div>

    <a href="#" class="btn-play">PLAY & WIN BIG COINS</a>
    <a href="https://wa.me/918788849415" class="btn-wa">Chat On WhatsApp</a>
</div>

</body>
</html>
