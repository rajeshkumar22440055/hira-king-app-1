<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hira King</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2000') no-repeat center center fixed; 
            background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .main-card {
            background: rgba(15, 10, 30, 0.9);
            border: 3px solid #FFD700;
            border-radius: 30px;
            padding: 40px 20px;
            width: 95%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
        }
        h1 { color: #FFD700; font-size: 3rem; text-shadow: 0 0 10px #000; margin-bottom: 5px; }
        .sub-text { color: #fff; font-size: 1.1rem; margin-bottom: 25px; font-weight: bold; }
        
        /* Pot Animation */
        .pot-box { position: relative; width: 120px; height: 100px; background: #DAA520; margin: 20px auto; border-radius: 0 0 50px 50px; border: 4px solid #fff; }
        .coin { position: absolute; top: -10px; left: 45%; width: 20px; height: 20px; background: gold; border-radius: 50%; animation: fall 1.2s linear infinite; }
        @keyframes fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(120px); opacity: 0; } }

        .btn-play { display: block; background: linear-gradient(#FFD700, #B8860B); padding: 18px; border-radius: 50px; color: #000; text-decoration: none; font-weight: 900; font-size: 1.2rem; margin-bottom: 15px; border: 2px solid #fff; }
        .btn-wa { display: block; background: #25D366; padding: 15px; border-radius: 50px; color: #fff; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>HIRA KING</h1>
    <p class="sub-text">KHELO AUR JEETO DIGITAL COINS!</p>
    
    <div class="pot-box">
        <div class="coin" style="animation-delay: 0s;"></div>
        <div class="coin" style="animation-delay: 0.4s;"></div>
        <div class="coin" style="animation-delay: 0.8s;"></div>
    </div>

    <a href="#" class="btn-play">PLAY & WIN BIG COINS</a>
    <a href="https://wa.me/918788849415" class="btn-wa">Chat On WhatsApp</a>
</div>

</body>
</html>
